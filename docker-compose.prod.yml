services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: base-ai-tfa-web:latest
    restart: unless-stopped
    environment:
      PORT: "8000"
      WEB_CONCURRENCY: "1"
      ANALYSIS_SESSION_TTL_HOURS: "24"
      TRAINING_RETENTION_ENABLED: "${TRAINING_RETENTION_ENABLED:-1}"
      TRAINING_DATA_DIR: "/app/training-data"
      TRAINING_ADMIN_TOKEN: "${TRAINING_ADMIN_TOKEN:-}"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./training-data:/app/training-data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
